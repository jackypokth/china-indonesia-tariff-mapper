openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tariff
    description: China–Indonesia tariff code mapping operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /tariff/search:
    post:
      operationId: searchTariffMatches
      tags: [tariff]
      summary: Search cross-country tariff code matches
      description: >
        Given a product description, HS code, or local tariff code in one country,
        returns ranked candidate classifications in the other country.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TariffSearchInput"
      responses:
        "200":
          description: Ranked match results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffSearchResult"
  /tariff/codes:
    get:
      operationId: listTariffCodes
      tags: [tariff]
      summary: List reference tariff codes
      description: Returns the seeded reference dataset of tariff codes, optionally filtered by country.
      parameters:
        - name: country
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Country"
      responses:
        "200":
          description: List of reference tariff codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TariffCode"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Country:
      type: string
      enum: [china, indonesia]
    QueryType:
      type: string
      enum: [description, hs_code, local_code]
    MatchLabel:
      type: string
      enum: [exact_match, likely_match, partial_match, manual_review_required]
    AmbiguityLevel:
      type: string
      enum: [low, medium, high]
      description: >
        Derived only from candidate_margin (+ top score), never a second
        confidence score: low = high separation (margin >= 0.15 and top >=
        0.85), medium = margin in [0.08, 0.15), high = competing candidates
        (margin < 0.08).
    TariffCode:
      type: object
      description: A single national tariff code entry, illustrative prototype data only.
      required:
        - code
        - country
        - hsAnchor
        - description
        - tariffRate
        - tariffNote
        - source
        - verified
      properties:
        code:
          type: string
          description: Full national tariff/customs code (may extend beyond 6 HS digits).
        country:
          $ref: "#/components/schemas/Country"
        hsAnchor:
          type: string
          description: The 6-digit HS anchor this code extends.
        description:
          type: string
        tariffRate:
          type: ["string", "null"]
          description: >
            Representative tariff rate, or "Not available in current source
            data" when the row is not yet verified. Never a placeholder
            numeric rate.
        tariffNote:
          type: ["string", "null"]
        source:
          type: string
          description: Reference/citation for this entry.
        verified:
          type: boolean
          description: True when this row has a hand-curated, checkable rate; false for auto-imported placeholder rows pending verification.
    TariffSearchInput:
      type: object
      required:
        - query
        - queryType
        - direction
      properties:
        query:
          type: string
          minLength: 1
        queryType:
          $ref: "#/components/schemas/QueryType"
        direction:
          type: string
          enum: [china_to_indonesia, indonesia_to_china]
    SourceStatus:
      type: string
      description: >
        Provenance of this entry's classification/tariff data. Kept strictly
        separate from match_confidence — a classification can be fully
        certain while its tariff rate is still pending import.
      enum:
        - official tariff schedule
        - public nomenclature source
        - tariff data pending
        - source unavailable
    TariffStatus:
      type: string
      description: Whether a real, sourced tariff rate can be displayed for this candidate.
      enum:
        - available
        - not available in current source data
        - not applicable
    MatchReasoning:
      type: object
      description: >
        Transparent breakdown of the attribute-first, hierarchical confidence
        formula: 0.40 * product_type_match + 0.25 * function_match +
        0.15 * attribute_match + 0.10 * text_semantic_similarity +
        0.10 * national_extension_specificity. Product type and primary
        function dominate on purpose so a broad, generic heading cannot
        outrank a narrower, product-type-correct heading merely by sharing
        more literal words (material/use) with the query. Deliberately
        excludes any tariff-source verification signal — that is surfaced
        separately via `tariff_status` / `source_status` on the match.
      required:
        - product_type_match
        - function_match
        - attribute_match
        - text_semantic_similarity
        - national_extension_specificity
        - conflicts
        - explanation
        - ambiguity_note
        - tariff_commentary
      properties:
        product_type_match:
          type: number
          minimum: 0
          maximum: 1
          description: How well the candidate's product type matches the query's primary product type.
        function_match:
          type: number
          minimum: 0
          maximum: 1
          description: How well the candidate's primary function matches the query's.
        attribute_match:
          type: number
          minimum: 0
          maximum: 1
          description: Support from material/use/other supporting attributes — never dominant on its own.
        text_semantic_similarity:
          type: number
          minimum: 0
          maximum: 1
          description: Raw lexical/semantic text overlap between the query and the candidate description.
        national_extension_specificity:
          type: number
          minimum: 0
          maximum: 1
          description: >
            1.0 only if exactly one target national line is uniquely
            supported; lower when several national extensions exist.
        conflicts:
          type: array
          items:
            type: string
          description: >
            Non-empty when this candidate's product type/function conflicts
            with a more specific, positively-matched product family — in
            which case match_confidence is capped at 0.39.
        explanation:
          type: string
          description: >
            1-2 sentence wording-layer summary (GPT-controlled, evidence-only,
            or a deterministic template fallback) generated only for the
            final top-5 candidates.
        ambiguity_note:
          type: string
          description: Wording-layer note on national-extension or cross-candidate ambiguity, when present.
        tariff_commentary:
          type: string
          description: Wording-layer note on tariff-data availability only; never states a rate unless one is on file.
    TariffMatch:
      type: object
      required:
        - matched_code
        - hs6_anchor
        - country
        - description
        - match_confidence
        - match_label
        - manual_review_required
        - reasoning
        - tariff_rate
        - tariff_note
        - tariff_status
        - source_status
        - source_references
      properties:
        matched_code:
          type: string
        hs6_anchor:
          type: string
        country:
          $ref: "#/components/schemas/Country"
        description:
          type: string
        match_confidence:
          type: number
          minimum: 0
          maximum: 1
          description: >
            Heuristic 0-1 score composed ONLY of classification evidence (see
            MatchReasoning). Not an empirically calibrated probability, and
            never capped or reduced by tariff-source completeness.
        match_label:
          $ref: "#/components/schemas/MatchLabel"
        manual_review_required:
          type: boolean
          description: >
            True only when classification evidence itself is ambiguous or
            insufficient (no credible anchor, competing anchors, competing
            target candidates, or a national extension requiring an absent
            attribute). Never true merely because a tariff rate is pending or
            a source row is unverified.
        reasoning:
          $ref: "#/components/schemas/MatchReasoning"
        tariff_rate:
          type: ["string", "null"]
          description: >
            Real rate string from a verified dataset row, or null when no
            verified row stores one. Never a placeholder numeric rate.
        tariff_note:
          type: ["string", "null"]
        tariff_status:
          $ref: "#/components/schemas/TariffStatus"
        source_status:
          $ref: "#/components/schemas/SourceStatus"
        source_references:
          type: array
          items:
            type: string
          description: Citation(s)/reference(s) backing this entry.
    TariffSearchResult:
      type: object
      required:
        - query
        - queryType
        - direction
        - anchorHsCode
        - manualReviewRequired
        - candidate_margin
        - ambiguity_level
        - required_attributes
        - missing_attributes
        - attribute_options
        - improvement_panel_visible
        - matches
      properties:
        query:
          type: string
        queryType:
          $ref: "#/components/schemas/QueryType"
        direction:
          type: string
          enum: [china_to_indonesia, indonesia_to_china]
        anchorHsCode:
          type: ["string", "null"]
          description: The nearest HS 6-digit anchor identified for this query, if any.
        manualReviewRequired:
          type: boolean
          description: >
            Aggregate convenience flag: true when no candidates could be
            classified at all, or every candidate individually requires
            manual review. Prefer each match's own `manual_review_required`.
        candidate_margin:
          type: number
          minimum: 0
          maximum: 1
          description: >
            top_1.match_confidence - top_2.match_confidence after sorting by
            match_confidence. 1 when there are fewer than two candidates.
            Used only as an ambiguity signal, never blended into any
            candidate's match_confidence.
        ambiguity_level:
          $ref: "#/components/schemas/AmbiguityLevel"
        required_attributes:
          type: array
          items:
            type: string
          description: >
            Product attributes that would distinguish the top candidates
            (from the classification_rules table when the top anchor is
            covered, else a generic fallback). Empty for a clear,
            high-separation match.
        missing_attributes:
          type: array
          items:
            type: string
          description: >
            Subset of required_attributes not yet supplied via the
            structured-details form. Equal to required_attributes until
            answers are merged into the query.
        attribute_options:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Suggested answer options per required attribute, for the structured-details form.
        improvement_panel_visible:
          type: boolean
          description: >
            True only when manualReviewRequired is true, OR candidate_margin
            < 0.08, OR required_attributes is non-empty. Drives the single
            shared "Improve classification precision" panel; never true for a
            clear, high-separation match.
        matches:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/TariffMatch"
