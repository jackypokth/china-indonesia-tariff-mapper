openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tariff
    description: China–Indonesia tariff code mapping operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /tariff/search:
    post:
      operationId: searchTariffMatches
      tags: [tariff]
      summary: Search cross-country tariff code matches
      description: >
        Given a product description, HS code, or local tariff code in one country,
        returns ranked candidate classifications in the other country.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TariffSearchInput"
      responses:
        "200":
          description: Ranked match results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffSearchResult"
  /tariff/codes:
    get:
      operationId: listTariffCodes
      tags: [tariff]
      summary: List reference tariff codes
      description: Returns the seeded reference dataset of tariff codes, optionally filtered by country.
      parameters:
        - name: country
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Country"
      responses:
        "200":
          description: List of reference tariff codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TariffCode"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Country:
      type: string
      enum: [china, indonesia]
    QueryType:
      type: string
      enum: [description, hs_code, local_code]
    MatchLabel:
      type: string
      enum: [exact_match, likely_match, partial_match, manual_review_required]
    TariffCode:
      type: object
      description: A single national tariff code entry, illustrative prototype data only.
      required:
        - code
        - country
        - hsAnchor
        - description
        - tariffRate
        - tariffNote
        - source
        - verified
      properties:
        code:
          type: string
          description: Full national tariff/customs code (may extend beyond 6 HS digits).
        country:
          $ref: "#/components/schemas/Country"
        hsAnchor:
          type: string
          description: The 6-digit HS anchor this code extends.
        description:
          type: string
        tariffRate:
          type: ["string", "null"]
          description: >
            Representative tariff rate, or "Not available in current source
            data" when the row is not yet verified. Never a placeholder
            numeric rate.
        tariffNote:
          type: ["string", "null"]
        source:
          type: string
          description: Reference/citation for this entry.
        verified:
          type: boolean
          description: True when this row has a hand-curated, checkable rate; false for auto-imported placeholder rows pending verification.
    TariffSearchInput:
      type: object
      required:
        - query
        - queryType
        - direction
      properties:
        query:
          type: string
          minLength: 1
        queryType:
          $ref: "#/components/schemas/QueryType"
        direction:
          type: string
          enum: [china_to_indonesia, indonesia_to_china]
    MatchExplanation:
      type: object
      required:
        - basis
        - detail
      properties:
        basis:
          type: string
          enum:
            - shared_hs_digits
            - semantic_description_similarity
            - tariff_book_structure
            - exact_code_lookup
        detail:
          type: string
    MatchReasoning:
      type: object
      description: >
        Transparent breakdown of the weighted confidence formula: 0.45 *
        hs_anchor_strength + 0.35 * description_similarity + 0.10 *
        national_extension_evidence + 0.10 * source_completeness. Every
        component is 0-1.
      required:
        - hs_anchor_strength
        - description_similarity
        - national_extension_evidence
        - source_completeness
      properties:
        hs_anchor_strength:
          type: number
          minimum: 0
          maximum: 1
        description_similarity:
          type: number
          minimum: 0
          maximum: 1
        national_extension_evidence:
          type: number
          minimum: 0
          maximum: 1
        source_completeness:
          type: number
          minimum: 0
          maximum: 1
    TariffMatch:
      type: object
      required:
        - code
        - country
        - description
        - match_confidence
        - matchLabel
        - explanation
        - reasoning
        - tariffRate
        - tariffNote
        - source
        - verified
      properties:
        code:
          type: string
        country:
          $ref: "#/components/schemas/Country"
        description:
          type: string
        match_confidence:
          type: number
          minimum: 0
          maximum: 1
          description: >
            Heuristic 0-1 score composed of the reasoning components below.
            Not an empirically calibrated probability.
        matchLabel:
          $ref: "#/components/schemas/MatchLabel"
        explanation:
          $ref: "#/components/schemas/MatchExplanation"
        reasoning:
          $ref: "#/components/schemas/MatchReasoning"
        tariffRate:
          type: ["string", "null"]
          description: >
            Representative tariff rate, or "Not available in current source
            data" when unverified. Never a placeholder numeric rate.
        tariffNote:
          type: ["string", "null"]
        source:
          type: string
        verified:
          type: boolean
    TariffSearchResult:
      type: object
      required:
        - query
        - queryType
        - direction
        - anchorHsCode
        - manualReviewRequired
        - missing_attributes
        - matches
      properties:
        query:
          type: string
        queryType:
          $ref: "#/components/schemas/QueryType"
        direction:
          type: string
          enum: [china_to_indonesia, indonesia_to_china]
        anchorHsCode:
          type: ["string", "null"]
          description: The nearest HS 6-digit anchor identified for this query, if any.
        manualReviewRequired:
          type: boolean
          description: True when no confident match exists and a human should review.
        missing_attributes:
          type: array
          items:
            type: string
          description: >
            Product attributes the user could supply (e.g. material,
            intended use, technical specification) to sharpen an ambiguous
            or low-confidence result.
        matches:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/TariffMatch"
